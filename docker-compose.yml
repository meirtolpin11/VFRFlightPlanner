version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: flightplanner
      POSTGRES_USER: fp_user
      POSTGRES_PASSWORD: fp_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fp_user -d flightplanner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
