version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: flightplanner
      POSTGRES_USER: fp_user
      POSTGRES_PASSWORD: fp_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fp_user -d flightplanner"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://fp_user:fp_pass@db:5432/flightplanner
      OPENAIP_API_KEY: ${OPENAIP_API_KEY}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
