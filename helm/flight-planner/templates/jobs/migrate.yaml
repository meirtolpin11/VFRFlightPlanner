apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "flight-planner.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "flight-planner.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.registry }}{{ if .Values.image.registry }}/{{ end }}{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          command: ["node", "dist/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "flight-planner.fullname" . }}-config
            - secretRef:
                name: {{ include "flight-planner.fullname" . }}-secret
  backoffLimit: 3
