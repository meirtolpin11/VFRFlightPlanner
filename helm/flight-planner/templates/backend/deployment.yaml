apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flight-planner.fullname" . }}-backend
  labels:
    {{- include "flight-planner.labels" . | nindent 4 }}
    {{- include "flight-planner.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "flight-planner.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flight-planner.backend.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.image.registry }}{{ if .Values.image.registry }}/{{ end }}{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          command: ["node", "dist/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "flight-planner.fullname" . }}-config
            - secretRef:
                name: {{ include "flight-planner.fullname" . }}-secret
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}{{ if .Values.image.registry }}/{{ end }}{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "flight-planner.fullname" . }}-config
            - secretRef:
                name: {{ include "flight-planner.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
